server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: meditrack-backend

  datasource:
    url: jdbc:mysql://localhost:3306/meditrack_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: root
    password: Nikkesh@2006
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 15MB

meditrack:
  jwt:
    secret: MediTrackSuperSecretKeyForJWTTokenGenerationAndValidation2024SecureKey
    expiration: 86400000
  upload:
    dir: ./uploads
  admin:
    email: admin@meditrack.com
    password: MediTrack@2026
    name: Central Admin

logging:
  level:
    com.meditrack: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
